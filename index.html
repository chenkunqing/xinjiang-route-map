<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新疆9天自驾路线图 - 2026.6.2-6.10</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #0ea5e9;
            --dark: #1e293b;
            --gray: #64748b;
            --light: #f8fafc;
            --white: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --radius: 16px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 100%);
            min-height: 100vh;
            color: var(--dark);
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #6366f1 100%);
            color: white;
            padding: 28px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
            position: relative;
        }

        .header-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
            position: relative;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.8;
        }

        /* Map Container */
        .map-container {
            padding: 16px;
        }

        .map-wrapper {
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            background: white;
        }

        #map {
            height: 45vh;
            min-height: 280px;
            max-height: 400px;
            width: 100%;
        }

        /* Legend */
        .legend-card {
            background: white;
            border-radius: var(--radius);
            padding: 16px;
            margin: 0 16px 16px;
            box-shadow: var(--shadow);
        }

        .legend-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--gray);
        }

        .legend-color {
            width: 24px;
            height: 6px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .legend-markers {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f1f5f9;
            flex-wrap: wrap;
        }

        .legend-marker {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--gray);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* Tabs */
        .tabs-container {
            background: white;
            margin: 0 16px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .tabs {
            display: flex;
            overflow-x: auto;
            padding: 8px;
            gap: 6px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            padding: 10px 16px;
            background: var(--light);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 13px;
            font-weight: 500;
            color: var(--gray);
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .tab:hover {
            background: #e2e8f0;
        }

        .tab.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* Day Content */
        .day-content {
            display: none;
            padding: 16px;
            animation: fadeIn 0.3s ease;
        }

        .day-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .day-header {
            margin-bottom: 16px;
        }

        .day-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 4px;
        }

        .day-subtitle {
            font-size: 13px;
            color: var(--gray);
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 24px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: linear-gradient(to bottom, var(--primary-light), var(--primary));
            border-radius: 2px;
        }

        .timeline-item {
            position: relative;
            padding: 12px 16px;
            background: white;
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .timeline-item:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow-lg);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -22px;
            top: 18px;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 0 2px var(--primary-light);
        }

        .timeline-time {
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .timeline-content {
            font-size: 13px;
            color: var(--dark);
            line-height: 1.5;
        }

        .timeline-content strong {
            color: var(--dark);
        }

        /* Special Blocks */
        .highlight, .tip, .warning {
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            margin: 12px 0;
            font-size: 13px;
            line-height: 1.6;
        }

        .highlight {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-left: 4px solid var(--warning);
            border-radius: var(--radius-sm);
        }

        .tip {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border-left: 4px solid var(--success);
            border-radius: var(--radius-sm);
        }

        .warning {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            border-left: 4px solid var(--danger);
            border-radius: var(--radius-sm);
        }

        .highlight strong, .tip strong, .warning strong {
            display: block;
            margin-bottom: 6px;
        }

        .highlight ul, .warning ul {
            padding-left: 18px;
            margin: 8px 0 0;
        }

        .highlight li, .warning li {
            margin: 4px 0;
        }

        /* Route Card */
        .route-card {
            background: white;
            border-radius: var(--radius);
            padding: 16px;
            margin: 12px 16px;
            box-shadow: var(--shadow);
        }

        .route-card h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .route-card h4 .tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
        }

        .tag-south { background: #fee2e2; color: #dc2626; }
        .tag-north { background: #dbeafe; color: #2563eb; }

        .route-card p {
            font-size: 13px;
            color: var(--gray);
            line-height: 1.6;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px 16px;
            color: var(--gray);
            font-size: 12px;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Desktop */
        

        /* Animations */
        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Custom Leaflet Styles */
        .custom-label {
            background: transparent !important;
            border: none !important;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .leaflet-popup-content {
            margin: 12px 16px;
            font-size: 13px;
        }

        /* ========== 移动端适配 ========== */
        @media (max-width: 768px) {
            /* Header */
            .header {
                padding: 16px 12px;
            }
            .header h1 {
                font-size: 18px;
                flex-wrap: wrap;
            }
            .header p {
                font-size: 12px;
            }
            .header-stats {
                gap: 16px;
            }
            .stat-value {
                font-size: 16px;
            }
            .stat-label {
                font-size: 10px;
            }

            /* 地图全屏 */
            .map-container {
                padding: 0;
            }
            .map-wrapper {
                border-radius: 0;
            }
            #map {
                height: 45vh !important;
                min-height: 300px;
            }

            /* Tabs横向滚动 */
            .tabs-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }
            .tabs-container::-webkit-scrollbar {
                display: none;
            }
            .tabs {
                flex-wrap: nowrap;
                min-width: max-content;
                padding: 0 8px;
            }
            .tab {
                padding: 10px 16px;
                font-size: 13px;
                white-space: nowrap;
            }

            /* 内容区域 */
            .day-content {
                padding: 12px;
            }
            .day-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .day-title {
                font-size: 18px;
            }
            .day-subtitle {
                font-size: 13px;
            }

            /* 路线卡片 */
            .route-card {
                padding: 12px;
                margin-bottom: 12px;
            }
            .timeline-item {
                padding-left: 20px;
            }
            .timeline-time {
                font-size: 12px;
                min-width: 50px;
            }

            /* 图例 */
            .legend-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .legend-card {
                padding: 10px;
            }

            /* 提示框 */
            .tip, .warning {
                margin: 12px 0;
                padding: 10px 12px;
                font-size: 13px;
            }

            /* Footer */
            .footer {
                padding: 12px;
                font-size: 11px;
            }
        }

        @media (max-width: 375px) {
            .header h1 {
                font-size: 16px;
            }
            .stat-value {
                font-size: 14px;
            }
            #map {
                height: 40vh !important;
            }
            .tab {
                padding: 8px 12px;
                font-size: 12px;
            }
            .legend-grid {
                grid-template-columns: 1fr;
            }
        }

</head>
<body>
    <div class="header">
        <h1>🗺️ 新疆9天自驾路线图</h1>
        <p>2026.6.2 - 6.10 · 3人出行 · 两人轮流开车</p>
        <div class="header-stats">
            <div class="stat-item">
                <div class="stat-value">9</div>
                <div class="stat-label">天</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">3000+</div>
                <div class="stat-label">公里</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">南疆+北疆</div>
                <div class="stat-label">大环线</div>
            </div>
        </div>
    </div>
    
    <div class="map-container">
        <div class="map-wrapper">
            <div id="map"></div>
        </div>
    </div>
    
    <div class="legend-card">
        <div class="legend-title">📍 每日路线</div>
        <div class="legend-grid">
            <div class="legend-item">
                <div class="legend-color" style="background: #FF6B6B;"></div>
                <span>Day1 喀什</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #4ECDC4;"></div>
                <span>Day2 塔县</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #45B7D1;"></div>
                <span>Day3 盘龙</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #96CEB4;"></div>
                <span>Day4 赛湖</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #FFEAA7;"></div>
                <span>Day5 伊犁</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #DDA0DD;"></div>
                <span>Day6 喀拉峻</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #FFB347;"></div>
                <span>Day7 唐布拉</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #87CEEB;"></div>
                <span>Day8 独库</span>
            </div>
        </div>
        <div class="legend-markers">
            <div class="legend-marker">
                <div class="legend-dot" style="background: #ff7043;"></div>
                <span>住宿</span>
            </div>
            <div class="legend-marker">
                <div class="legend-dot" style="background: #ffa726;"></div>
                <span>景点</span>
            </div>
            <div class="legend-marker">
                <div class="legend-dot" style="background: #66bb6a;"></div>
                <span>餐饮</span>
            </div>
        </div>
    </div>
    
    <div class="tabs-container">
        <div class="tabs">
            <button class="tab active" onclick="showDay('overview')">🗺️ 总览</button>
            <button class="tab" onclick="showDay('day1')">Day1 6/2</button>
            <button class="tab" onclick="showDay('day2')">Day2 6/3</button>
            <button class="tab" onclick="showDay('day3')">Day3 6/4</button>
            <button class="tab" onclick="showDay('day4')">Day4 6/5</button>
            <button class="tab" onclick="showDay('day5')">Day5 6/6</button>
            <button class="tab" onclick="showDay('day6')">Day6 6/7</button>
            <button class="tab" onclick="showDay('day7')">Day7 6/8</button>
            <button class="tab" onclick="showDay('day8')">Day8 6/9</button>
            <button class="tab" onclick="showDay('day9')">Day9 6/10</button>
        </div>
    </div>
    
    <!-- Overview -->
    <div id="overview" class="day-content active">
        <div class="day-header">
            <div class="day-title">🗓️ 9天行程总览</div>
            <div class="day-subtitle">南疆帕米尔 + 北疆伊犁环线</div>
        </div>
        
        <div class="route-card">
            <h4><span class="tag tag-south">南疆</span>第一段：帕米尔高原（6/2-6/4）</h4>
            <p>喀什古城 → G314高原线 → 白沙湖 → 喀拉库勒湖 → 塔什库尔干 → 盘龙古道 → 班迪尔蓝湖 → 喀什 ✈️ 乌鲁木齐</p>
        </div>
        
        <div class="route-card">
            <h4><span class="tag tag-north">北疆</span>第二段：伊犁环线（6/5-6/9）</h4>
            <p>乌鲁木齐 → 赛里木湖 → 果子沟 → 霍城薰衣草 → 霍尔果斯 → 特克斯 → 喀拉峻 → 唐布拉 → 独库公路 → 乌鲁木齐</p>
        </div>
        
        <div class="highlight">
            <strong>⛽ 三个加油盲区（务必加满！）</strong>
            <ul>
                <li>G314高原段（喀什→塔县）：中间无加油站</li>
                <li>唐布拉段（新源→乔尔玛）：100km无加油站</li>
                <li>独库北段（乔尔玛→独山子）：150km无加油站</li>
            </ul>
        </div>
    </div>
    
    <!-- Day 1 -->
    <div id="day1" class="day-content">
        <div class="day-header">
            <div class="day-title">Day 1 · 6月2日 周二</div>
            <div class="day-subtitle">抵达喀什 · 夜游古城</div>
        </div>
        <div class="timeline">
            <div class="timeline-item">
                <div class="timeline-time">16:10 - 16:30</div>
                <div class="timeline-content">📍 落地喀什徕宁机场，取行李</div>
            </div>
            <div class="timeline-item">
                <div class="timeline-time">16:30 - 17:00</div>
                <div class="timeline-content">🚗 取车 - 比亚迪宋Pro，检查车况、拍照留证</div>
            </div>
            <div class="timeline-item">
                <div class="timeline-time">17:00 - 18:00</div>
                <div class="timeline-content">🏨 入住喀什古城附近酒店（如家/汉庭人民路店，约150-200元/间）</div>
            </div>
            <div class="timeline-item">
                <div class="timeline-time">20:00 - 22:30</div>
                <div class="timeline-content">⭐ 喀什古城夜游：东门 → 彩虹巷 → 百年老茶馆（15元/壶）→ 古城灯光（21:00亮灯）</div>
            </div>
            <div class="timeline-item">
                <div class="timeline-time">22:00 - 22:30</div>
                <div class="timeline-content">🍴 古城夜市：烤包子(3-5元)、缸子肉(25-35元)、鸽子汤(30元)、酸奶刨冰(10元)，人均40-60元</div>
            </div>
        </div>
        <div class="tip">
            <strong>💡 提示</strong>喀什古城免费全天开放，晚上亮灯后最美。巷子多易迷路，跟着人流走。
        </div>
        <div class="warning">
            <strong>🏨 住宿</strong>喀什古城附近连锁酒店，约150-200元/间×2间
        </div>
    </div>
    
    <!-- Day 2 -->
    <div id="day2" class="day-content">
        <div class="day-header">
            <div class="day-title">Day 2 · 6月3日 周三</div>
            <div class="day-subtitle">喀什 → 白沙湖 → 喀拉库勒湖 → 塔县</div>
        </div>
        <div class="timeline">
            <div class="timeline-item">
                <div class="timeline-time">10:00 - 10:30</div>
                <div class="timeline-content">🍴 睡到自然醒，酒店附近吃早午餐（馕包肉或烤包子+奶茶）。<strong>加满油出发！</strong></div>
            </div>
            <div class="timeline-item">
                <div class="timeline-time">10:30</div>
                <div class="timeline-content">🚗 出发！导航"塔什库尔干"，走G314中巴友谊公路</div>
            </div>
            <div class="timeline-item">
                <div class="timeline-time">13:00 - 13:45</div>
                <div class="timeline-content">⭐ <strong>白沙湖</strong>（免费）：G314路边约160km处，蓝湖+白沙+雪山，像外星球。海拔3300m，别跑跳。</div>
            </div>
            <div class="timeline-item">
                <div class="timeline-time">15:00 - 16:00</div>
                <div class="timeline-content">⭐ <strong>喀拉库勒湖</strong>（50元/人）：正对慕士塔格峰（7546m），雪山倒影。海拔3600m！</div>
            </div>

        let routeLayers = [];
        let markerLayers = [];

        function clearMap() {
            routeLayers.forEach(layer => map.removeLayer(layer));
            markerLayers.forEach(layer => map.removeLayer(layer));
            routeLayers = [];
            markerLayers = [];
        }

        function getMarkerColor(type) {
            const dayColors = {
                'day1': '#FF6B6B', 'day2': '#4ECDC4', 'day3': '#45B7D1',
                'day4': '#96CEB4', 'day5': '#FFEAA7', 'day6': '#DDA0DD',
                'day7': '#FFB347', 'day8': '#87CEEB', 'day9': '#98D8C8'
            };
            if (dayColors[type]) return dayColors[type];
            switch(type) {
                case 'scenic': return '#f59e0b';
                case 'city': return '#10b981';
                case 'hotel': return '#ef4444';
                case 'food': return '#10b981';
                default: return '#6366f1';
            }
        }

        function createLabelIcon(name, type) {
            const bgColor = getMarkerColor(type);
            const isLight = ['day4', 'day5'].includes(type);
            const textColor = isLight ? '#333' : 'white';
            
            return L.divIcon({
                className: 'custom-label',
                html: `<div style="
                    background: ${bgColor};
                    color: ${textColor};
                    padding: 4px 10px;
                    border-radius: 12px;
                    font-size: 11px;
                    font-weight: 600;
                    white-space: nowrap;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
                    border: 2px solid white;
                ">${name}</div>`,
                iconSize: [100, 24],
                iconAnchor: [50, 12]
            });
        }

        function drawDayRoute(dayId) {
            clearMap();
            
            const dayData = dayRoutes[dayId];
            if (!dayData) return;
            
            // 绘制路线
            dayData.routes.forEach(route => {
                const polyline = L.polyline(route.points, {
                    color: route.color,
                    weight: route.weight,
                    opacity: route.opacity
                }).addTo(map);
                routeLayers.push(polyline);
            });
            
            // 添加标记
            dayData.markers.forEach(marker => {
                const color = getMarkerColor(marker.type);
                
                const circleMarker = L.circleMarker(marker.coord, {
                    radius: 8,
                    fillColor: color,
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.9
                }).addTo(map);
                markerLayers.push(circleMarker);
                
                const labelIcon = createLabelIcon(marker.name, marker.type);
                const labelMarker = L.marker(marker.coord, {icon: labelIcon}).addTo(map);
                
                const navName = marker.navName || marker.name;
                const amapUrl = `https://uri.amap.com/marker?position=${marker.coord[1]},${marker.coord[0]}&name=${encodeURIComponent(navName)}&coordinate=gaode&callnative=1`;
                
                const popupContent = `
                    <div style="text-align:center;">
                        <b style="font-size:14px;">${marker.name}</b><br>
                        <a href="${amapUrl}" target="_blank" style="
                            display:inline-block;
                            margin-top:8px;
                            padding:6px 16px;
                            background:#6366f1;
                            color:white;
                            border-radius:16px;
                            text-decoration:none;
                            font-size:12px;
                        ">📍 导航</a>
                    </div>
                `;
                labelMarker.bindPopup(popupContent);
                circleMarker.bindPopup(popupContent);
                markerLayers.push(labelMarker);
            });
            
            map.setView(dayData.center, dayData.zoom);
        }

        function showDay(dayId) {
            document.querySelectorAll('.day-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            
            document.getElementById(dayId).classList.add('active');
            event.target.classList.add('active');
            
            drawDayRoute(dayId);
        }

        // 初始绘制
        drawDayRoute('overview');
    </script>
